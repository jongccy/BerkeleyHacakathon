<!doctype html>
<meta charset="utf-8">
<title>Maui Evac</title>
<style>body{font-family:system-ui;max-width:560px;margin:40px auto;padding:0 16px}
label{display:block;margin:8px 0 2px}input,select{width:100%;padding:8px;box-sizing:border-box}
gmp-place-autocomplete{width:100%;display:block}
button{margin-top:16px;padding:10px 16px}button:disabled{opacity:.5;cursor:not-allowed}
pre{background:#f4f4f4;padding:12px;white-space:pre-wrap}
.hint{font-size:.85em;color:#666;margin-top:2px}.hint.err{color:#b00}</style>
<h1>Maui evacuation guidance</h1>
<label>Name</label><input id="name">
<label>Phone (+1...)</label><input id="phone">
<label>Home address</label>
<div id="addr-slot"><input id="address" placeholder="Enter a home address"></div>
<div id="addr-hint" class="hint">Loading address lookup…</div>
<label>Household size</label><input id="household_size" type="number" value="1">
<label>Has a car?</label><select id="has_car"><option value="1">Yes</option><option value="0">No</option></select>
<label>Mobility needs</label><input id="mobility_needs" value="none">
<label>Pets?</label><select id="pets"><option value="0">No</option><option value="1">Yes</option></select>
<button id="go" onclick="run()">Get my instruction</button>
<pre id="out"></pre>
<script>
let selected = null;     // {address, lat, lng} once a valid place is picked
let googleMode = false;
const $ = id => document.getElementById(id);
const setHint = (msg, err) => { const h = $('addr-hint'); h.textContent = msg; h.className = 'hint' + (err ? ' err' : ''); };

function loadMaps(key){
  return new Promise((resolve, reject) => {
    if (window.google && google.maps) return resolve();
    const s = document.createElement('script');
    s.src = `https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(key)}&libraries=places&loading=async&v=weekly`;
    s.async = true; s.onload = resolve; s.onerror = () => reject(new Error('maps script failed'));
    document.head.appendChild(s);
  });
}

async function initAddress(){
  let cfg = {};
  try { cfg = await (await fetch('/api/config')).json(); } catch {}

  if (!cfg.googleMapsApiKey) {
    // No Google key -> plain text box, server geocodes it (Photon/Open-Meteo).
    setHint("Enter a home address (e.g. Lahaina, HI) — we'll look it up.");
    return;
  }

  try {
    await loadMaps(cfg.googleMapsApiKey);
    const { PlaceAutocompleteElement } = await google.maps.importLibrary('places');
    const el = new PlaceAutocompleteElement({ includedRegionCodes: ['us'] });   // valid US addresses only
    el.id = 'gmp-address';

    // Swap the plain input for the Google autocomplete element.
    const slot = $('addr-slot'); slot.innerHTML = ''; slot.appendChild(el);
    googleMode = true;
    $('go').disabled = true;        // can't submit until a real address is chosen
    setHint('Start typing and pick an address from the suggestions.');

    el.addEventListener('gmp-select', async ({ placePrediction }) => {
      const place = placePrediction.toPlace();
      await place.fetchFields({ fields: ['formattedAddress', 'location'] });
      selected = { address: place.formattedAddress, lat: place.location.lat(), lng: place.location.lng() };
      $('go').disabled = false;     // a validated address is selected
      setHint('Selected: ' + selected.address);
    });
  } catch (e) {
    console.error('Google Autocomplete unavailable, falling back to plain lookup:', e);
    googleMode = false;
    if (!$('address')) { $('addr-slot').innerHTML = '<input id="address" placeholder="Enter a home address">'; }
    $('go').disabled = false;
    setHint("Address autocomplete unavailable — type an address and we'll look it up.");
  }
}

async function run(){
  const body = {
    name: $('name').value, phone: $('phone').value,
    household_size: +$('household_size').value, has_car: +$('has_car').value,
    mobility_needs: $('mobility_needs').value, pets: +$('pets').value, language: 'en'
  };

  if (googleMode) {
    if (!selected) { setHint('Please choose an address from the suggestions.', true); return; }
    body.address = selected.address; body.lat = selected.lat; body.lng = selected.lng;  // exact Google coords
  } else {
    const addr = ($('address') || {}).value || '';
    if (!addr.trim()) { setHint('Please enter a home address.', true); return; }
    body.address = addr;
  }

  $('out').textContent = 'Working…';
  try {
    const r = await fetch('/api/advise', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(body) });
    $('out').textContent = JSON.stringify(await r.json(), null, 2);
  } catch (e) {
    $('out').textContent = 'Request failed: ' + e;
  }
}

initAddress();
</script>
